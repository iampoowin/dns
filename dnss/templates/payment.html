{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <h2 class="section-title" style="margin-bottom: 2rem;">Secure Checkout</h2>
        
        <div class="highlight-box">
            <h3 style="margin-bottom: 0.5rem; font-size: 1.25rem; font-weight: 600;">{{ course.title }}</h3>
            <div class="card-price" style="margin-bottom: 0;">
                ₹{{ course.price }} <span style="font-size: 0.9rem;">Total Amount</span>
            </div>
        </div>
        
        <!-- Mock Payment Form for DNS Whitelisting Testing -->
        <form action="/success" method="GET">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" required placeholder="Enter your full name">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="To send your course access">
            </div>
            
            <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" class="form-control" required placeholder="WhatsApp number preferred">
            </div>
            
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem; font-size: 1.1rem; padding: 1.1rem;">
                Pay ₹{{ course.price }} Securely
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.85rem;">
            <p>🔒 100% Secure Encrypted Transaction</p>
        </div>
    </div>
</div>
{% endblock %}
