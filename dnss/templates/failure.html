{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto; text-align: center; padding: 4rem 2rem;">
        <div class="status-icon status-failure">✕</div>
        <h2 style="font-size: 2.5rem; margin-bottom: 1rem; font-weight: 700; letter-spacing: -1px;">Payment Failed</h2>
        <p style="font-size: 1.1rem; margin-bottom: 2rem; color: var(--text-secondary);">Oops! Something went wrong with your transaction. No charges were made.</p>
        
        <div class="highlight-box" style="display: inline-block;">
            <p style="color: var(--text-primary);"><strong>Error:</strong> Bank server timeout or incorrect details.</p>
        </div>
        <br>
        <button onclick="history.back()" class="btn btn-outline" style="margin-right: 1rem;">Try Again</button>
        <a href="{{ url_for('contact') }}" class="btn">Contact Support</a>
    </div>
</div>
{% endblock %}
